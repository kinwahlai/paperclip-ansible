---
- name: Get npm global bin directory
  ansible.builtin.command: npm prefix -g
  register: npm_prefix
  changed_when: false

- name: Set paperclip binary path fact
  ansible.builtin.set_fact:
    paperclip_bin: "{{ npm_prefix.stdout | trim }}/bin/paperclipai"

- name: Get current Paperclip version (pre-upgrade)
  ansible.builtin.command: "{{ paperclip_bin }} --version"
  register: version_before
  failed_when: false
  changed_when: false

- name: Install or upgrade paperclipai globally via npm
  ansible.builtin.command: npm install -g paperclipai
  changed_when: false

- name: Get Paperclip version (post-install)
  ansible.builtin.command: "{{ paperclip_bin }} --version"
  register: version_after
  changed_when: false

- name: Notify service restart if version changed
  ansible.builtin.debug:
    msg: "Paperclip upgraded: {{ version_before.stdout | default('none') }} → {{ version_after.stdout }}"
  changed_when: version_before.stdout | default('') != version_after.stdout
  notify: Restart paperclip

- name: Display post-install note
  ansible.builtin.debug:
    msg:
      - "Paperclip {{ version_after.stdout }} installed."
      - "Binary: {{ paperclip_bin }}"
      - "paperclipai run will bootstrap config, DB, and keys on first start."
      - "API will be available at: http://127.0.0.1:{{ paperclip_port }}"
