---
# Expose paperclip on a dedicated tailscale HTTPS port so it doesn't
# conflict with openclaw gateway which owns the root https / endpoint.
#
# Result: https://<tailnet-hostname>:{{ paperclip_tailscale_https_port }}/
#   → http://127.0.0.1:{{ paperclip_port }}

- name: Check tailscale is installed
  ansible.builtin.command: which tailscale
  register: tailscale_check
  changed_when: false
  failed_when: false

- name: Configure paperclip on tailscale serve port {{ paperclip_tailscale_https_port }}
  ansible.builtin.command: >
    tailscale serve --bg https:{{ paperclip_tailscale_https_port }} /
    http://127.0.0.1:{{ paperclip_port }}
  changed_when: true
  when: tailscale_check.rc == 0

- name: Show tailscale serve status
  ansible.builtin.command: tailscale serve status
  register: serve_status
  changed_when: false
  when: tailscale_check.rc == 0

- name: Print tailscale serve status
  ansible.builtin.debug:
    msg: "{{ serve_status.stdout_lines }}"
  when: tailscale_check.rc == 0
