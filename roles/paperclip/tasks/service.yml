---
- name: Deploy Paperclip systemd service
  ansible.builtin.template:
    src: paperclip.service.j2
    dest: /etc/systemd/system/paperclip.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart paperclip

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start Paperclip service
  ansible.builtin.systemd:
    name: paperclip
    state: started
    enabled: true

- name: Verify Paperclip service is running
  ansible.builtin.systemd:
    name: paperclip
  register: paperclip_service_status

- name: Display service status
  ansible.builtin.debug:
    msg: "Paperclip service state: {{ paperclip_service_status.status.ActiveState }}"
