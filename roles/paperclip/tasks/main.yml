---
- name: Include Node.js installation tasks
  ansible.builtin.include_tasks: nodejs.yml

- name: Include user creation tasks
  ansible.builtin.include_tasks: user.yml

- name: Include Paperclip installation tasks
  ansible.builtin.include_tasks: install.yml

- name: Include systemd service tasks
  ansible.builtin.include_tasks: service.yml
  when: not ci_test

- name: Include tailscale serve tasks
  ansible.builtin.include_tasks: tailscale.yml
  when: not ci_test and paperclip_tailscale_enable
