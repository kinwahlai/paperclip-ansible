---
# CI testing mode - skips onboard and systemd tasks
ci_test: false

# Node.js version (Paperclip requires 20+)
nodejs_version: "22.x"

# Paperclip system user
paperclip_user: paperclip
paperclip_home: /home/paperclip

# API server port (localhost-only — access via Tailscale or SSH tunnel)
paperclip_port: 3100

# Alibaba Cloud Coding Plan API key for opencode (format: sk-sp-xxx)
opencode_api_key: ""

# SSH keys for paperclip user (optional — for direct SSH access)
# Example:
#   paperclip_ssh_keys:
#     - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGxxxxxxxx user@host"
paperclip_ssh_keys: []

# Tailscale serve — expose paperclip at a dedicated HTTPS port on the tailnet.
# Uses a separate port (not /) to avoid conflicting with openclaw gateway which
# owns the root https:443 endpoint via tailscale serve.
# Set to false to skip tailscale configuration.
paperclip_tailscale_enable: true
paperclip_tailscale_https_port: 8443
